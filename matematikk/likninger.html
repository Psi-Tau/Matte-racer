<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likningsmesteren - Steg for Steg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            z-index: 50;
            border-radius: 2px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(720deg); }
        }

        /* Penere scrollbar for historikken */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f8fafc; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col relative">
        
        <!-- Header -->
        <div class="bg-slate-50 p-6 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-indigo-600 tracking-tight">Likningsmesteren</h1>
                <p id="level-text" class="text-sm font-semibold text-slate-500 mt-1 uppercase tracking-wider">Nivå 1: Novise</p>
            </div>
            <div class="text-right">
                <div class="text-3xl font-black text-pink-500" id="score-display">0</div>
                <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Poeng</div>
            </div>
        </div>

        <div class="h-2 bg-slate-200 w-full relative">
            <div id="level-progress" class="h-full bg-gradient-to-r from-indigo-500 to-pink-500 transition-all duration-500" style="width: 0%;"></div>
        </div>

        <!-- Hovedområde -->
        <div class="p-6 sm:p-8 flex flex-col items-center w-full">
            
            <div id="streak-indicator" class="h-6 mb-2 flex items-center justify-center text-orange-500 font-bold text-sm opacity-0 transition-opacity duration-300">
                🔥 <span id="streak-count">3</span> på rad! (+<span id="streak-bonus"></span> poeng)
            </div>

            <!-- Instruksjon -->
            <p class="text-sm sm:text-base text-slate-500 mb-6 text-center max-w-lg">
                Løs likningen ved å gjøre <strong>nøyaktig det samme</strong> på begge sider under streken.<br>
                F.eks: <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-indigo-600">- 4</span>, <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-indigo-600">+ 2x</span> eller <span class="font-mono bg-slate-100 px-1 py-0.5 rounded text-indigo-600">/ 3</span>
            </p>

            <!-- Liknings-brettet -->
            <div id="equation-container" class="font-bold text-slate-700 w-full mb-6 max-h-80 overflow-y-auto custom-scrollbar overflow-x-hidden p-2">
                <!-- Fylles av JS -->
            </div>

            <!-- Knapper for handling -->
            <div class="flex space-x-3 sm:space-x-4 w-full max-w-md">
                <button id="reset-eq-btn" class="w-1/3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl text-sm sm:text-base shadow-sm transition active:scale-95">
                    Visk ut
                </button>
                <button id="submit-btn" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl text-lg sm:text-xl shadow-lg shadow-indigo-200 transition active:scale-95">
                    Utfør handling
                </button>
            </div>

            <div id="feedback-message" class="mt-4 text-base font-bold h-6 text-center"></div>
        </div>
    </div>

    <script>
        // Spilltilstand
        let score = 0;
        let streak = 0;
        let currentLevel = 1;
        
        // Likningstilstand (Ax + B = Cx + D)
        let initA = 0, initB = 0, initC = 0, initD = 0;
        let currentA = 0, currentB = 0, currentC = 0, currentD = 0;
        let stepHistory = [];
        let isWon = false;
        
        const levels = [
            { threshold: 0, name: "Nivå 1: Novise", desc: "x + a = b", maxScore: 50 },
            { threshold: 50, name: "Nivå 2: Lærling", desc: "ax = b  eller  ax + b = c", maxScore: 150 },
            { threshold: 150, name: "Nivå 3: Mester", desc: "ax + b = cx + d (Lette)", maxScore: 300 },
            { threshold: 300, name: "Nivå 4: Legende", desc: "ax + b = cx + d (Tøffere)", maxScore: 500 }
        ];

        // DOM Elementer
        const equationContainer = document.getElementById('equation-container');
        const submitBtn = document.getElementById('submit-btn');
        const resetBtn = document.getElementById('reset-eq-btn');
        const scoreDisplay = document.getElementById('score-display');
        const levelText = document.getElementById('level-text');
        const levelProgress = document.getElementById('level-progress');
        const feedbackMessage = document.getElementById('feedback-message');
        const streakIndicator = document.getElementById('streak-indicator');
        const streakCount = document.getElementById('streak-count');
        const streakBonus = document.getElementById('streak-bonus');

        function randomInt(min, max, excludeZero = false) {
            let num;
            do { num = Math.floor(Math.random() * (max - min + 1)) + min; } while (excludeZero && num === 0);
            return num;
        }

        // Formaterer mattestykket pent
        function formatExpr(A, B) {
            let parts = [];
            if (A !== 0) {
                if (A === 1) parts.push("x");
                else if (A === -1) parts.push("-x");
                else parts.push(A + "x");
            }
            if (B !== 0) {
                if (parts.length === 0) {
                    parts.push(B.toString());
                } else {
                    if (B > 0) parts.push("+ " + B);
                    else parts.push("- " + Math.abs(B));
                }
            }
            return parts.length === 0 ? "0" : parts.join(" ");
        }

        // Analyserer hva eleven skriver (f.eks "+ 4", "- 2x", "/ 3")
        function parseAction(str) {
            str = str.replace(/\s+/g, '').toLowerCase();
            const match = str.match(/^([+\-*/:])(-?\d*x?)$/);
            if (!match) return null;
            
            let op = match[1] === ':' ? '/' : match[1];
            let operandStr = match[2];
            if (operandStr === '' || operandStr === '-') return null;
            
            let isX = operandStr.includes('x');
            let numStr = operandStr.replace('x', '');
            let num = 1;
            
            if (numStr === '-') num = -1;
            else if (numStr !== '') {
                num = parseInt(numStr, 10);
                if (isNaN(num)) return null;
            }

            return { op, isX, num, raw: str.replace(/^([+\-*/:])/, '$1 ') };
        }

        // Utfører handlingen på uttrykket
        function applyAction(A, B, action) {
            let newA = A, newB = B;
            
            if (action.op === '+') {
                if (action.isX) newA += action.num; else newB += action.num;
            } else if (action.op === '-') {
                if (action.isX) newA -= action.num; else newB -= action.num;
            } else if (action.op === '/' || action.op === '*') {
                if (action.isX) return { error: "I dette spillet ganger/deler vi bare med tall, ikke med x." };
                if (action.num === 0) return { error: "Man kan ikke dele eller gange med null!" };
                
                if (action.op === '/') {
                    if (A % action.num !== 0 || B % action.num !== 0) {
                        return { error: "Pass på! Det gir desimaltall. Prøv å samle x-ene og tallene først." };
                    }
                    newA = A / action.num; newB = B / action.num;
                } else if (action.op === '*') {
                    newA = A * action.num; newB = B * action.num;
                }
            }
            return { A: newA, B: newB };
        }

        function generateEquation() {
            let a = 0, b = 0, c = 0, d = 0;
            let sol = randomInt(-10, 10);
            
            if (currentLevel === 1) {
                a = 1; c = 0; b = randomInt(-15, 15);
                sol = randomInt(1, 15); 
            } else if (currentLevel === 2) {
                a = randomInt(2, 6); c = 0; b = randomInt(-20, 20);
                sol = randomInt(-8, 8, true);
            } else if (currentLevel === 3) {
                a = randomInt(2, 6); c = randomInt(1, 4);
                while(a === c) c = randomInt(1, 4);
                b = randomInt(-15, 15); sol = randomInt(-8, 8);
            } else {
                a = randomInt(-5, 5, true); c = randomInt(-5, 5, true);
                while(a === c) c = randomInt(-5, 5, true);
                b = randomInt(-25, 25); sol = randomInt(-12, 12);
            }

            d = (a - c) * sol + b;

            initA = a; initB = b; initC = c; initD = d;
            currentA = a; currentB = b; currentC = c; currentD = d;
            stepHistory = [];
            isWon = false;
            submitBtn.disabled = false;
            feedbackMessage.textContent = "";
            
            renderEquation();
        }

        function resetEquation() {
            currentA = initA; currentB = initB; currentC = initC; currentD = initD;
            stepHistory = [];
            isWon = false;
            submitBtn.disabled = false;
            renderEquation();
            showFeedback("Kladdearket er visket ut!", "text-slate-500");
        }

        function renderEquation() {
            let html = '<div class="flex flex-col items-center w-full space-y-1">';
            
            // Historikk
            for (let step of stepHistory) {
                html += `
                <div class="flex w-full justify-center items-center text-xl sm:text-2xl opacity-50 mt-2">
                    <div class="w-[45%] text-right pr-2 sm:pr-4">${formatExpr(step.A, step.B)}</div>
                    <div class="w-[10%] text-center text-slate-300">=</div>
                    <div class="w-[45%] text-left pl-2 sm:pl-4">${formatExpr(step.C, step.D)}</div>
                </div>
                <div class="flex w-full justify-center items-center text-orange-600 text-sm sm:text-base font-bold">
                    <div class="w-[45%] text-right pr-2 sm:pr-4">${step.actionStr}</div>
                    <div class="w-[10%] text-center"></div>
                    <div class="w-[45%] text-left pl-2 sm:pl-4">${step.actionStr}</div>
                </div>
                <div class="w-2/3 border-b-2 border-slate-200 mt-1"></div>
                `;
            }

            // Nåværende tilstand
            if (isWon) {
                html += `
                <div class="flex w-full justify-center items-center text-4xl sm:text-5xl text-emerald-500 font-black py-6 animate-pop">
                    <div class="w-[45%] text-right pr-2 sm:pr-4">${formatExpr(currentA, currentB)}</div>
                    <div class="w-[10%] text-center">=</div>
                    <div class="w-[45%] text-left pl-2 sm:pl-4">${formatExpr(currentC, currentD)}</div>
                </div>
                `;
            } else {
                html += `
                <div class="flex w-full justify-center items-center text-3xl sm:text-4xl text-indigo-700 py-4 font-black">
                    <div class="w-[45%] text-right pr-2 sm:pr-4">${formatExpr(currentA, currentB)}</div>
                    <div class="w-[10%] text-center text-slate-400">=</div>
                    <div class="w-[45%] text-left pl-2 sm:pl-4">${formatExpr(currentC, currentD)}</div>
                </div>
                <!-- Input felt -->
                <div class="flex w-full justify-center items-center mt-2 mb-4">
                    <div class="w-[45%] flex justify-end pr-2 sm:pr-4">
                        <input type="text" id="action-left" class="w-20 sm:w-28 text-center bg-indigo-50 border-b-4 border-indigo-200 py-2 focus:border-indigo-500 outline-none text-xl transition-colors placeholder-indigo-200 rounded-t-lg" placeholder="- 4" autocomplete="off">
                    </div>
                    <div class="w-[10%] flex justify-center">
                        <!-- Loddrett skille -->
                    </div>
                    <div class="w-[45%] flex justify-start pl-2 sm:pl-4">
                        <input type="text" id="action-right" class="w-20 sm:w-28 text-center bg-indigo-50 border-b-4 border-indigo-200 py-2 focus:border-indigo-500 outline-none text-xl transition-colors placeholder-indigo-200 rounded-t-lg" placeholder="- 4" autocomplete="off">
                    </div>
                </div>
                `;
            }
            html += '</div>';
            equationContainer.innerHTML = html;

            if (!isWon) {
                const actionLeft = document.getElementById('action-left');
                const actionRight = document.getElementById('action-right');
                
                const handleEnter = (e) => { if (e.key === 'Enter') submitAction(); };
                actionLeft.addEventListener('keypress', handleEnter);
                actionRight.addEventListener('keypress', handleEnter);
                
                // Autofokus på PC
                if(window.innerWidth > 600) {
                    setTimeout(() => actionLeft.focus(), 50);
                }
            }
            
            // Scroll ned for å alltid se siste steg
            equationContainer.scrollTop = equationContainer.scrollHeight;
        }

        function submitAction() {
            const leftStr = document.getElementById('action-left').value;
            const rightStr = document.getElementById('action-right').value;

            if (!leftStr || !rightStr) {
                showFeedback("Husk å skrive på BEGGE sider!", "text-orange-500");
                return;
            }

            if (leftStr.replace(/\s/g, '').toLowerCase() !== rightStr.replace(/\s/g, '').toLowerCase()) {
                showFeedback("Regel: Du må gjøre NØYAKTIG det samme på begge sider!", "text-pink-500");
                return;
            }

            const action = parseAction(leftStr);
            if (!action) {
                showFeedback("Ugyldig, prøv formatet: + 4, - 2x, / 3", "text-orange-500");
                return;
            }

            const newLeft = applyAction(currentA, currentB, action);
            const newRight = applyAction(currentC, currentD, action);

            if (newLeft && newLeft.error) return showFeedback(newLeft.error, "text-orange-500");
            if (newRight && newRight.error) return showFeedback(newRight.error, "text-orange-500");
            
            if (!newLeft || !newRight) return showFeedback("Noe gikk galt.", "text-orange-500");

            // Lagre historikk og oppdater
            stepHistory.push({
                A: currentA, B: currentB, C: currentC, D: currentD,
                actionStr: action.raw
            });

            currentA = newLeft.A; currentB = newLeft.B;
            currentC = newRight.A; currentD = newRight.B;

            renderEquation();
            checkWinCondition();
        }

        function checkWinCondition() {
            // Målet er at x står alene (1x + 0 = 0x + tall)
            if ((currentA === 1 && currentB === 0 && currentC === 0) || 
                (currentC === 1 && currentD === 0 && currentA === 0)) {
                
                isWon = true;
                submitBtn.disabled = true;
                renderEquation(); 
                
                streak++;
                let points = 10;
                let bonus = 0;
                
                if (streak > 1) {
                    bonus = Math.min(streak * 2, 20); 
                    points += bonus;
                    streakCount.textContent = streak;
                    streakBonus.textContent = bonus;
                    streakIndicator.classList.remove('opacity-0');
                    if(streak % 3 === 0) throwConfetti(15);
                }

                score += points;
                updateStats();
                showFeedback("Likningen er løst! 🎉", "text-emerald-500");
                
                // Generer ny etter en liten pause
                setTimeout(generateEquation, 2500);
            }
        }

        function updateStats() {
            scoreDisplay.textContent = score;
            scoreDisplay.classList.add('animate-pop');
            setTimeout(() => scoreDisplay.classList.remove('animate-pop'), 300);

            let newLevel = 1;
            for (let i = levels.length - 1; i >= 0; i--) {
                if (score >= levels[i].threshold) {
                    newLevel = i + 1;
                    break;
                }
            }

            if (newLevel > currentLevel) {
                currentLevel = newLevel;
                throwConfetti(50);
                showFeedback(`Nytt Nivå Låst Opp! 🏆`, "text-indigo-600");
            }

            levelText.textContent = levels[currentLevel - 1].name;

            const currentLevelData = levels[currentLevel - 1];
            let progress = 100;
            
            if (currentLevel < levels.length) {
                const nextLevelData = levels[currentLevel];
                const pointsInLevel = score - currentLevelData.threshold;
                const pointsNeeded = nextLevelData.threshold - currentLevelData.threshold;
                progress = (pointsInLevel / pointsNeeded) * 100;
            }
            levelProgress.style.width = `${progress}%`;
        }

        function showFeedback(msg, colorClass) {
            feedbackMessage.textContent = msg;
            feedbackMessage.className = `mt-4 text-base font-bold h-6 text-center ${colorClass}`;
            if (!colorClass.includes("emerald")) {
                setTimeout(() => { if (feedbackMessage.textContent === msg) feedbackMessage.textContent = ""; }, 3000);
            }
        }

        function throwConfetti(amount = 30) {
            const colors = ['#fde047', '#3b82f6', '#ec4899', '#10b981', '#a855f7'];
            for (let i = 0; i < amount; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                conf.style.top = -(Math.random() * 20) + 'px'; 
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }

        // Lyttere
        submitBtn.addEventListener('click', submitAction);
        resetBtn.addEventListener('click', resetEquation);

        // Start!
        generateEquation();
        updateStats();

    </script>
</body>
</html>
