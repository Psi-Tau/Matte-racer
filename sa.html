<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Latin-Amerika Geografi Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --ocean: #e0f2fe;
            --land-base: #ffffff;
            --land-stroke: #94a3b8;
            --correct: #22c55e;
            --wrong: #ef4444;
            --highlight: #facc15;
            --accent-blue: #3b82f6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Sidepanel til venstre, Kart til høyre */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .sidebar {
                height: auto;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
        }

        .sidebar {
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            z-index: 20;
            box-shadow: 4px 0 15px rgba(0,0,0,0.02);
            overflow: hidden;
        }

        .map-area {
            background-color: var(--ocean);
            background-image: radial-gradient(#bae6fd 1.2px, transparent 1.2px);
            background-size: 35px 35px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .country-path {
            fill: var(--land-base);
            stroke: var(--land-stroke);
            stroke-width: 0.7;
            transition: all 0.2s ease;
        }

        .country-path.active-hover {
            fill: var(--highlight);
            stroke: #854d0e;
            stroke-width: 1.2;
            cursor: pointer;
        }

        .country-path.is-correct {
            fill: var(--correct);
            stroke: #14532d;
        }

        .country-path.is-wrong {
            fill: var(--wrong);
            stroke: #7f1d1d;
        }

        /* Skjulte navn som dukker opp ved riktig svar */
        .country-label {
            font-size: 14px;
            font-weight: 700;
            fill: #1e293b;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-anchor: middle;
            paint-order: stroke;
            stroke: white;
            stroke-width: 3px;
            stroke-linejoin: round;
        }

        .country-label.show {
            opacity: 1;
        }

        .draggable-name {
            touch-action: none;
            user-select: none;
            cursor: grab;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            background: white;
        }

        .draggable-name:hover {
            border-color: var(--accent-blue);
            background-color: #f1f5f9;
        }

        .floating-label {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
            white-space: nowrap;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .shake { animation: shake 0.3s ease-in-out; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-layout">
        <!-- SIDEBAR (Overskrift, poeng og navn her) -->
        <aside class="sidebar flex flex-col h-full">
            <div class="p-6 pb-0">
                <h1 class="text-2xl font-black tracking-tighter text-blue-600">Latin-Amerika</h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-4">Geografisk Oversikt</p>

                <div class="flex gap-2 mb-6">
                    <div class="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                        <span class="block text-[9px] text-slate-400 font-bold uppercase">Resultat</span>
                        <span id="score-text" class="text-xl font-black text-slate-700">0 / 21</span>
                    </div>
                    <div class="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                        <span class="block text-[9px] text-slate-400 font-bold uppercase">Tid</span>
                        <span id="timer-text" class="text-xl font-black text-slate-700">0:00</span>
                    </div>
                </div>

                <div class="text-xs font-bold text-slate-400 uppercase mb-3 tracking-wider">Landliste:</div>
            </div>
            
            <div id="names-container" class="flex-grow overflow-y-auto custom-scroll px-6 pb-6 space-y-2">
                <!-- Navn injiseres her -->
            </div>
        </aside>

        <!-- KART (Hele høyre side) -->
        <main class="map-area">
            <svg id="svg-map" viewBox="0 0 1000 1600" class="h-full w-auto">
                <g id="countries-layer">
                    <!-- MELLOM-AMERIKA -->
                    <path id="mexico" d="M20,50 L200,50 L250,150 L220,250 L100,280 L50,200 Z" class="country-path" />
                    <text x="135" y="150" class="country-label" data-id="mexico">Mexico</text>

                    <path id="guatemala" d="M100,280 L160,280 L180,330 L130,350 L90,320 Z" class="country-path" />
                    <text x="135" y="315" class="country-label" data-id="guatemala">Guatemala</text>

                    <path id="belize" d="M160,280 L190,285 L195,315 L180,310 Z" class="country-path" />
                    <text x="178" y="300" class="country-label" data-id="belize" style="font-size: 10px;">Belize</text>

                    <path id="el_salvador" d="M130,350 L155,355 L160,375 L135,370 Z" class="country-path" />
                    <text x="145" y="390" class="country-label" data-id="el_salvador" style="font-size: 8px;">El Salvador</text>

                    <path id="honduras" d="M160,280 L230,290 L240,340 L180,330 Z" class="country-path" />
                    <text x="210" y="320" class="country-label" data-id="honduras" style="font-size: 11px;">Honduras</text>

                    <path id="nicaragua" d="M180,330 L240,340 L250,400 L195,410 L185,380 Z" class="country-path" />
                    <text x="220" y="375" class="country-label" data-id="nicaragua">Nicaragua</text>

                    <path id="costa_rica" d="M195,410 L250,400 L240,440 L210,450 Z" class="country-path" />
                    <text x="220" y="425" class="country-label" data-id="costa_rica" style="font-size: 9px;">Costa Rica</text>

                    <path id="panama" d="M210,450 L260,435 L300,450 L290,480 L210,480 Z" class="country-path" />
                    <text x="255" y="470" class="country-label" data-id="panama" style="font-size: 10px;">Panama</text>

                    <!-- SØR-AMERIKA -->
                    <path id="colombia" d="M290,480 L350,470 L400,490 L440,540 L380,630 L320,630 L270,550 Z" class="country-path" />
                    <text x="350" y="560" class="country-label" data-id="colombia">Colombia</text>

                    <path id="venezuela" d="M400,490 L450,460 L540,450 L600,480 L620,530 L550,570 L440,540 Z" class="country-path" />
                    <text x="500" y="510" class="country-label" data-id="venezuela">Venezuela</text>

                    <path id="guyana" d="M600,480 L660,485 L670,540 L620,530 Z" class="country-path" />
                    <text x="635" y="510" class="country-label" data-id="guyana" style="font-size: 10px;">Guyana</text>

                    <path id="surinam" d="M660,485 L710,495 L720,550 L670,540 Z" class="country-path" />
                    <text x="690" y="525" class="country-label" data-id="surinam" style="font-size: 10px;">Surinam</text>

                    <path id="fransk_guyana" d="M710,495 L750,505 L760,560 L720,550 Z" class="country-path" />
                    <text x="735" y="540" class="country-label" data-id="fransk_guyana" style="font-size: 8px;">Fransk Guyana</text>

                    <path id="ecuador" d="M240,610 L270,570 L340,630 L290,680 L230,650 Z" class="country-path" />
                    <text x="280" y="635" class="country-label" data-id="ecuador" style="font-size: 10px;">Ecuador</text>

                    <path id="peru" d="M230,650 L290,680 L340,630 L400,620 L440,680 L480,780 L400,850 L310,780 L210,680 Z" class="country-path" />
                    <text x="320" y="730" class="country-label" data-id="peru">Peru</text>

                    <path id="bolivia" d="M440,680 L520,680 L580,750 L560,860 L460,880 L400,850 Z" class="country-path" />
                    <text x="480" y="780" class="country-label" data-id="bolivia">Bolivia</text>

                    <path id="brasil" d="M440,540 L550,570 L620,530 L670,540 L720,550 L760,560 L850,600 L950,700 L920,950 L800,1050 L700,1050 L650,980 L560,860 L580,750 L520,680 L440,680 Z" class="country-path" />
                    <text x="680" y="780" class="country-label" data-id="brasil" style="font-size: 24px;">Brasil</text>

                    <path id="paraguay" d="M560,860 L650,860 L670,950 L590,980 L560,940 Z" class="country-path" />
                    <text x="610" y="920" class="country-label" data-id="paraguay" style="font-size: 11px;">Paraguay</text>

                    <path id="uruguay" d="M660,1050 L740,1040 L760,1110 L680,1130 Z" class="country-path" />
                    <text x="720" y="1090" class="country-label" data-id="uruguay" style="font-size: 10px;">Uruguay</text>
                    
                    <path id="chile" d="M400,850 L460,880 L430,1000 L390,1200 L350,1400 L370,1550 L310,1550 L290,1400 L320,1200 L340,1000 L300,850 Z" class="country-path" />
                    <text x="350" y="1150" class="country-label" data-id="chile" style="font-size: 14px; transform: rotate(90deg); transform-origin: 350px 1150px;">Chile</text>
                    
                    <path id="argentina" d="M460,880 L560,860 L560,940 L590,980 L660,1050 L680,1130 L600,1400 L550,1550 L370,1550 L350,1400 L390,1200 L430,1000 Z" class="country-path" />
                    <text x="480" y="1150" class="country-label" data-id="argentina">Argentina</text>
                </g>
            </svg>

            <!-- Win Overlay -->
            <div id="win-overlay" class="hidden absolute inset-0 bg-white/80 backdrop-blur-md flex items-center justify-center z-50 p-8">
                <div class="bg-white p-12 rounded-[3rem] text-slate-900 text-center shadow-2xl border border-slate-100 max-w-sm">
                    <div class="text-6xl mb-4">🏆</div>
                    <h2 class="text-3xl font-black mb-2 text-blue-600">Fantastisk!</h2>
                    <p id="final-time" class="text-lg font-bold text-slate-500 mb-8">Tid: 0:00</p>
                    <button onclick="location.reload()" class="w-full bg-blue-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg">Spill igjen</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const countries = [
            { id: 'mexico', name: 'Mexico' }, { id: 'guatemala', name: 'Guatemala' },
            { id: 'belize', name: 'Belize' }, { id: 'el_salvador', name: 'El Salvador' },
            { id: 'honduras', name: 'Honduras' }, { id: 'nicaragua', name: 'Nicaragua' },
            { id: 'costa_rica', name: 'Costa Rica' }, { id: 'panama', name: 'Panama' },
            { id: 'argentina', name: 'Argentina' }, { id: 'bolivia', name: 'Bolivia' },
            { id: 'brasil', name: 'Brasil' }, { id: 'chile', name: 'Chile' },
            { id: 'colombia', name: 'Colombia' }, { id: 'ecuador', name: 'Ecuador' },
            { id: 'guyana', name: 'Guyana' }, { id: 'paraguay', name: 'Paraguay' },
            { id: 'peru', name: 'Peru' }, { id: 'surinam', name: 'Surinam' },
            { id: 'uruguay', name: 'Uruguay' }, { id: 'venezuela', name: 'Venezuela' },
            { id: 'fransk_guyana', name: 'Fransk Guyana' }
        ];

        let score = 0;
        let startTime = Date.now();
        let timerInterval;

        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            const mins = Math.floor(diff / 60);
            const secs = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer-text').textContent = `${mins}:${secs}`;
        }

        function init() {
            const container = document.getElementById('names-container');
            container.innerHTML = '';
            
            // Tilfeldig rekkefølge på landene i sidepanelet
            [...countries].sort(() => Math.random() - 0.5).forEach(country => {
                const div = document.createElement('div');
                div.className = 'draggable-name p-3 rounded-xl font-bold text-sm shadow-sm border border-slate-200';
                div.textContent = country.name;
                div.dataset.id = country.id;
                
                div.draggable = true;
                div.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', country.id);
                    div.classList.add('opacity-30');
                });
                div.addEventListener('dragend', () => div.classList.remove('opacity-30'));

                // Mobilstøtte
                div.addEventListener('touchstart', handleTouchStart, {passive: false});
                div.addEventListener('touchmove', handleTouchMove, {passive: false});
                div.addEventListener('touchend', handleTouchEnd);

                container.appendChild(div);
            });

            // Setter opp kart-interaksjon
            document.querySelectorAll('.country-path').forEach(path => {
                path.addEventListener('dragover', e => e.preventDefault());
                path.addEventListener('dragenter', () => path.classList.add('active-hover'));
                path.addEventListener('dragleave', () => path.classList.remove('active-hover'));
                path.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const id = e.dataTransfer.getData('text/plain');
                    checkMatch(id, path.id);
                });
            });

            timerInterval = setInterval(updateTimer, 1000);
        }

        function checkMatch(draggedId, targetId) {
            const pathElement = document.getElementById(targetId);
            if (!pathElement) return;
            pathElement.classList.remove('active-hover');

            if (draggedId === targetId) {
                if (pathElement.classList.contains('is-correct')) return;
                
                // Marker land som korrekt
                pathElement.classList.add('is-correct');
                
                // Vis navnet på kartet
                const label = document.querySelector(`.country-label[data-id="${targetId}"]`);
                if (label) label.classList.add('show');

                score++;
                document.getElementById('score-text').textContent = `${score} / ${countries.length}`;
                
                // Fjern fra sidepanelet
                document.querySelectorAll('.draggable-name').forEach(el => {
                    if (el.dataset.id === draggedId) el.remove();
                });

                if (score === countries.length) win();
            } else {
                // Feil land
                pathElement.classList.add('is-wrong', 'shake');
                setTimeout(() => pathElement.classList.remove('is-wrong', 'shake'), 500);
            }
        }

        // --- Touch Logic ---
        let ghost = null;
        let currentTouchTarget = null;

        function handleTouchStart(e) {
            const touch = e.touches[0];
            ghost = this.cloneNode(true);
            ghost.className = 'floating-label';
            document.body.appendChild(ghost);
            updateGhostPos(touch);
            e.preventDefault();
        }

        function handleTouchMove(e) {
            const touch = e.touches[0];
            updateGhostPos(touch);
            
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.country-path').forEach(p => p.classList.remove('active-hover'));
            if (target && target.classList.contains('country-path')) {
                target.classList.add('active-hover');
                currentTouchTarget = target;
            }
        }

        function handleTouchEnd(e) {
            if (ghost) {
                const id = ghost.dataset.id;
                if (currentTouchTarget) {
                    checkMatch(id, currentTouchTarget.id);
                }
                ghost.remove();
                ghost = null;
                currentTouchTarget = null;
            }
        }

        function updateGhostPos(t) {
            ghost.style.left = t.clientX + 'px';
            ghost.style.top = (t.clientY - 40) + 'px';
            ghost.style.transform = 'translate(-50%, -50%)';
        }

        function win() {
            clearInterval(timerInterval);
            document.getElementById('win-overlay').classList.remove('hidden');
            document.getElementById('final-time').textContent = `Tid: ${document.getElementById('timer-text').textContent}`;
        }

        window.onload = init;
    </script>
</body>
</html>
